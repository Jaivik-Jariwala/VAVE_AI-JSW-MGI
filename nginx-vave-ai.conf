server {
    listen 80;
    server_name _;  # Change this to your domain name (e.g., vave.example.com)

    # Increase max upload size for large files
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/vave-ai-access.log;
    error_log /var/log/nginx/vave-ai-error.log;

    # Main application
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # Static files
    location /static {
        alias /opt/vave-ai/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Temporary files (uploads/downloads)
    location /temp {
        alias /opt/vave-ai/temp;
        expires 1d;
    }

    # Health check endpoint (optional)
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }
}

